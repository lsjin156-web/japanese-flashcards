<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇯🇵 소희의 일본어 플래시카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    h1 {
      color: white;
      font-size: 1.8rem;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .total-count {
      color: rgba(255,255,255,0.65);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .tab.active, .tab:hover {
      background: white;
      color: #764ba2;
      border-color: white;
    }

    .search-box {
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 20px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 0.9rem;
      outline: none;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.6); }

    .card-container {
      perspective: 1000px;
      width: 100%;
      max-width: 480px;
      height: 280px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .card-front { background: white; }
    .card-back { background: #f0f0ff; transform: rotateY(180deg); }

    .japanese {
      font-size: 1.75rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.4;
    }

    .hiragana { font-size: 1rem; color: #888; margin-bottom: 4px; text-align: center; }
    .hint { font-size: 0.8rem; color: #aaa; margin-top: 14px; }

    .meaning {
      font-size: 1.3rem;
      font-weight: bold;
      color: #764ba2;
      margin-bottom: 10px;
      text-align: center;
      line-height: 1.4;
    }

    .romaji { font-size: 0.9rem; color: #888; text-align: center; }
    .pronunciation { font-size: 0.85rem; color: #aaa; margin-top: 6px; text-align: center; }

    .category-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #764ba2;
      color: white;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .progress-bar {
      width: 100%;
      max-width: 480px;
      height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 10px 26px;
      border-radius: 24px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .btn-prev { background: rgba(255,255,255,0.25); color: white; }
    .btn-next { background: white; color: #764ba2; }
    .btn:hover { transform: scale(1.05); }

    .counter {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      min-width: 70px;
      text-align: center;
    }

    .flip-hint {
      color: rgba(255,255,255,0.55);
      font-size: 0.78rem;
      margin-top: 10px;
    }

    .shuffle-btn {
      margin-top: 14px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 18px;
      border-radius: 16px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .shuffle-btn:hover { background: rgba(255,255,255,0.28); }

    .loading {
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      margin-top: 60px;
    }

    .updated-at {
      color: rgba(255,255,255,0.4);
      font-size: 0.72rem;
      margin-top: 18px;
    }

    /* 모바일 최적화 */
    @media (max-width: 480px) {
      body { padding: 20px 14px; }
      h1 { font-size: 1.4rem; }
      .card-container { height: 260px; }
      .japanese { font-size: 1.45rem; }
      .meaning { font-size: 1.1rem; }
      .btn { padding: 9px 20px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<h1>🇯🇵 소희의 일본어 플래시카드</h1>
<p class="subtitle">카드를 탭하면 뒤집혀요!</p>
<p class="total-count" id="totalCount">로딩 중...</p>

<div class="tabs">
  <button class="tab active" onclick="filterCards('all', this)">전체</button>
  <button class="tab" onclick="filterCards('sentence', this)">문장</button>
  <button class="tab" onclick="filterCards('word', this)">단어</button>
  <button class="tab" onclick="filterCards('grammar', this)">문법</button>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 일본어 / 한국어로 검색..." oninput="handleSearch()" />
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="card-container" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="category-badge" id="badge">문장</span>
      <div class="japanese" id="japanese">로딩 중...</div>
      <div class="hiragana" id="hiragana"></div>
      <div class="hint">👆 탭하면 답이 나와요</div>
    </div>
    <div class="card-face card-back">
      <span class="category-badge" id="badge2">문장</span>
      <div class="meaning" id="meaning"></div>
      <div class="romaji" id="romaji"></div>
      <div class="pronunciation" id="pronunciation"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prevCard()">← 이전</button>
  <span class="counter" id="counter">- / -</span>
  <button class="btn btn-next" onclick="nextCard()">다음 →</button>
</div>

<p class="flip-hint">← → 키로도 넘길 수 있어요 · 스와이프도 돼요</p>
<button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
<p class="updated-at" id="updatedAt"></p>

<script>
let allCards = [];
let filtered = [];
let current = 0;
let flipped = false;
let activeCategory = 'all';
let touchStartX = 0;

// JSON에서 데이터 로드
async function loadCards() {
  try {
    const res = await fetch('./japanese_sentences.json?t=' + Date.now());
    const data = await res.json();
    const sentences = data.sentences || [];

    // category 추론: 의미가 짧고 히라가나만이면 단어, ~します/~ます 패턴이면 문법, 나머지 문장
    allCards = sentences.map(s => {
      let category = 'sentence';
      const jp = s.jp || '';
      const meaning = s.meaning || '';
      // 단어: 일본어가 짧고(5자 이하) 의미도 짧음
      if (jp.length <= 6 && meaning.length <= 12 && !jp.includes('。') && !jp.includes('、')) {
        category = 'word';
      }
      // 문법 패턴: ~로 시작하는 패턴
      if (jp.startsWith('〜') || jp.startsWith('～')) {
        category = 'grammar';
      }
      return {
        category,
        japanese: jp,
        hiragana: s.hira || '',
        romaji: s.roma || '',
        pronunciation: s.pron || '',
        meaning: meaning
      };
    });

    filtered = [...allCards];
    document.getElementById('totalCount').textContent =
      `총 ${allCards.length}개 카드 · 매일 자동 업데이트`;

    if (data.updatedAt) {
      document.getElementById('updatedAt').textContent =
        '마지막 업데이트: ' + new Date(data.updatedAt).toLocaleDateString('ko-KR');
    }

    renderCard();
  } catch (e) {
    document.getElementById('japanese').textContent = '데이터 로드 실패 😢';
    document.getElementById('totalCount').textContent = '파일을 불러올 수 없어요';
  }
}

function filterCards(type, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = type;
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allCards.filter(c => {
    const catOk = activeCategory === 'all' || c.category === activeCategory;
    const searchOk = !q || c.japanese.includes(q) || c.meaning.toLowerCase().includes(q) ||
      c.pronunciation.includes(q) || c.romaji.toLowerCase().includes(q);
    return catOk && searchOk;
  });
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function handleSearch() { applyFilter(); }

function renderCard() {
  if (!filtered.length) {
    document.getElementById('japanese').textContent = '검색 결과 없음';
    document.getElementById('hiragana').textContent = '';
    document.getElementById('meaning').textContent = '';
    document.getElementById('romaji').textContent = '';
    document.getElementById('pronunciation').textContent = '';
    document.getElementById('badge').textContent = '-';
    document.getElementById('badge2').textContent = '-';
    document.getElementById('counter').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const c = filtered[current];
  const label = c.category === 'sentence' ? '문장' : c.category === 'word' ? '단어' : '문법';
  document.getElementById('japanese').textContent = c.japanese;
  document.getElementById('hiragana').textContent = c.hiragana;
  document.getElementById('meaning').textContent = c.meaning;
  document.getElementById('romaji').textContent = c.romaji;
  document.getElementById('pronunciation').textContent = c.pronunciation;
  document.getElementById('badge').textContent = label;
  document.getElementById('badge2').textContent = label;
  document.getElementById('counter').textContent = `${current + 1} / ${filtered.length}`;
  const pct = ((current + 1) / filtered.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function nextCard() {
  if (!filtered.length) return;
  current = (current + 1) % filtered.length;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function prevCard() {
  if (!filtered.length) return;
  current = (current - 1 + filtered.length) % filtered.length;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function shuffleCards() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

// 키보드
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// 스와이프
document.querySelector('.card-container').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.querySelector('.card-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    dx < 0 ? nextCard() : prevCard();
  } else {
    flipCard();
  }
});

loadCards();
</script>
</body>
</html>
