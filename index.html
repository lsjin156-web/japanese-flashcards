<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇯🇵 상진의 일본어 플래시카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: .85rem; margin-bottom: 6px; }
    .total-count { color: #484f58; font-size: .75rem; margin-bottom: 24px; }

    .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    .tab {
      padding: 6px 16px; border-radius: 16px; border: 1px solid #30363d;
      background: transparent; color: #8b949e; cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .tab.active, .tab:hover { background: #58a6ff22; color: #58a6ff; border-color: #58a6ff; }

    .search-box { width: 100%; max-width: 480px; margin-bottom: 14px; }
    .search-box input {
      width: 100%; padding: 10px 16px; border-radius: 12px;
      border: 1px solid #30363d; background: #161b22; color: #e6edf3;
      font-size: .85rem; outline: none;
    }
    .search-box input:focus { border-color: #58a6ff; }
    .search-box input::placeholder { color: #484f58; }

    .progress-bar {
      width: 100%; max-width: 480px; height: 3px;
      background: #21262d; border-radius: 2px; margin-bottom: 16px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: #58a6ff; border-radius: 2px; transition: width .3s; }

    .card-container {
      perspective: 1000px; width: 100%; max-width: 480px;
      height: 280px; cursor: pointer; margin-bottom: 16px;
    }

    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px 24px;
      border: 1px solid #30363d;
    }
    .card-front { background: #161b22; }
    .card-back { background: #161b22; transform: rotateY(180deg); }

    .japanese {
      font-size: 1.7rem; font-weight: 600; color: #e6edf3;
      margin-bottom: 8px; text-align: center; line-height: 1.4;
    }
    .hiragana { font-size: .9rem; color: #8b949e; text-align: center; }
    .hint { font-size: .75rem; color: #484f58; margin-top: 14px; }

    .meaning {
      font-size: 1.2rem; font-weight: 600; color: #58a6ff;
      margin-bottom: 8px; text-align: center; line-height: 1.4;
    }
    .romaji { font-size: .85rem; color: #8b949e; text-align: center; }
    .pronunciation { font-size: .8rem; color: #484f58; margin-top: 4px; text-align: center; }

    .category-badge {
      position: absolute; top: 12px; right: 12px;
      background: #1f6feb22; color: #58a6ff; font-size: .65rem;
      padding: 3px 10px; border-radius: 10px; border: 1px solid #1f6feb44;
    }

    .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
    .btn {
      padding: 10px 24px; border-radius: 12px; border: 1px solid #30363d;
      font-size: .9rem; cursor: pointer; transition: all .2s; font-weight: 500;
    }
    .btn-prev { background: #21262d; color: #8b949e; }
    .btn-next { background: #58a6ff; color: #fff; border-color: #58a6ff; }
    .btn:hover { transform: scale(1.05); }
    .counter { color: #8b949e; font-size: .9rem; min-width: 70px; text-align: center; }

    .flip-hint { color: #484f58; font-size: .72rem; margin-top: 8px; }

    .shuffle-btn {
      margin-top: 12px; background: transparent; color: #8b949e;
      border: 1px solid #30363d; padding: 6px 16px; border-radius: 12px;
      font-size: .78rem; cursor: pointer; transition: all .2s;
    }
    .shuffle-btn:hover { background: #21262d; color: #e6edf3; }

    .loading { color: #8b949e; font-size: 1rem; margin-top: 60px; }
    .updated-at { color: #484f58; font-size: .68rem; margin-top: 16px; }

    @media (max-width: 480px) {
      body { padding: 20px 14px; }
      h1 { font-size: 1.3rem; }
      .card-container { height: 260px; }
      .japanese { font-size: 1.4rem; }
      .meaning { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<h1>🇯🇵 상진의 일본어 플래시카드</h1>
<p class="subtitle">카드를 탭하면 뒤집혀요!</p>
<p class="total-count" id="totalCount">로딩 중...</p>

<div class="tabs">
  <button class="tab active" onclick="filterCards('all', this)">전체</button>
  <button class="tab" onclick="filterCards('sentence', this)">문장</button>
  <button class="tab" onclick="filterCards('word', this)">단어</button>
  <button class="tab" onclick="filterCards('grammar', this)">문법</button>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 일본어 / 한국어로 검색..." oninput="handleSearch()" />
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="category-badge" id="badge">문장</span>
      <div class="japanese" id="japanese">로딩 중...</div>
      <div class="hiragana" id="hiragana"></div>
      <div class="hint">👆 탭하면 답이 나와요</div>
    </div>
    <div class="card-face card-back">
      <span class="category-badge" id="badge2">문장</span>
      <div class="meaning" id="meaning"></div>
      <div class="romaji" id="romaji"></div>
      <div class="pronunciation" id="pronunciation"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prevCard()">← 이전</button>
  <span class="counter" id="counter">- / -</span>
  <button class="btn btn-next" onclick="nextCard()">다음 →</button>
</div>

<p class="flip-hint">← → 키로도 넘길 수 있어요 · 스페이스로 뒤집기 · 스와이프도 돼요</p>
<button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
<p class="updated-at" id="updatedAt"></p>

<script>
let allCards = [];
let filtered = [];
let current = 0;
let flipped = false;
let activeCategory = 'all';
let touchStartX = 0;

async function loadCards() {
  try {
    const res = await fetch('./japanese_sentences.json?t=' + Date.now());
    const data = await res.json();
    const sentences = data.sentences || [];

    allCards = sentences.map(s => {
      let category = 'sentence';
      const jp = s.jp || '';
      const meaning = s.meaning || '';
      if (jp.length <= 6 && meaning.length <= 12 && !jp.includes('。') && !jp.includes('、')) {
        category = 'word';
      }
      if (jp.startsWith('〜') || jp.startsWith('～')) {
        category = 'grammar';
      }
      return {
        category,
        japanese: jp,
        hiragana: s.hira || '',
        romaji: s.roma || '',
        pronunciation: s.pron || '',
        meaning: meaning
      };
    });

    filtered = [...allCards];
    document.getElementById('totalCount').textContent =
      `총 ${allCards.length}개 카드 · 매일 자동 업데이트`;

    if (data.updatedAt) {
      document.getElementById('updatedAt').textContent =
        '마지막 업데이트: ' + new Date(data.updatedAt).toLocaleDateString('ko-KR');
    }

    renderCard();
  } catch (e) {
    document.getElementById('japanese').textContent = '데이터 로드 실패 😢';
    document.getElementById('totalCount').textContent = '파일을 불러올 수 없어요';
  }
}

function filterCards(type, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = type;
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allCards.filter(c => {
    const catOk = activeCategory === 'all' || c.category === activeCategory;
    const searchOk = !q || c.japanese.includes(q) || c.meaning.toLowerCase().includes(q) ||
      c.pronunciation.includes(q) || c.romaji.toLowerCase().includes(q);
    return catOk && searchOk;
  });
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function handleSearch() { applyFilter(); }

function renderCard() {
  if (!filtered.length) {
    document.getElementById('japanese').textContent = '검색 결과 없음';
    document.getElementById('hiragana').textContent = '';
    document.getElementById('meaning').textContent = '';
    document.getElementById('romaji').textContent = '';
    document.getElementById('pronunciation').textContent = '';
    document.getElementById('badge').textContent = '-';
    document.getElementById('badge2').textContent = '-';
    document.getElementById('counter').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const c = filtered[current];
  const label = c.category === 'sentence' ? '문장' : c.category === 'word' ? '단어' : '문법';
  document.getElementById('japanese').textContent = c.japanese;
  document.getElementById('hiragana').textContent = c.hiragana;
  document.getElementById('meaning').textContent = c.meaning;
  document.getElementById('romaji').textContent = c.romaji;
  document.getElementById('pronunciation').textContent = c.pronunciation;
  document.getElementById('badge').textContent = label;
  document.getElementById('badge2').textContent = label;
  document.getElementById('counter').textContent = `${current + 1} / ${filtered.length}`;
  document.getElementById('progressFill').style.width = ((current + 1) / filtered.length * 100) + '%';
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function nextCard() {
  if (!filtered.length) return;
  current = (current + 1) % filtered.length;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function prevCard() {
  if (!filtered.length) return;
  current = (current - 1 + filtered.length) % filtered.length;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function shuffleCards() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

const cardContainer = document.getElementById('cardContainer');
let touchStartY = 0;
let touchMoved = false;

cardContainer.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, { passive: true });

cardContainer.addEventListener('touchmove', e => {
  const dx = Math.abs(e.touches[0].clientX - touchStartX);
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dx > 8 || dy > 8) touchMoved = true;
}, { passive: true });

cardContainer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (!touchMoved) {
    flipCard();
  } else if (Math.abs(dx) > 50) {
    dx < 0 ? nextCard() : prevCard();
  }
  e.preventDefault();
}, { passive: false });

cardContainer.addEventListener('click', flipCard);

loadCards();
</script>
</body>
</html>
